name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Sync updater pubkey
        run: node scripts/sync-updater-pubkey.mjs

      - name: Prepare updater signing key
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/keys
          printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY" > apps/desktop/src-tauri/keys/memora.key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: apps/desktop/src-tauri/keys/memora.key
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: Memora v__VERSION__
          releaseBody: |
            See the assets to download this version and install.

            The app will check this release for updates automatically.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
